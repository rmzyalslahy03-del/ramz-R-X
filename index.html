<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Ramz-X | منصة التواصل الاجتماعي</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="icon/icon-192x192.png">
    <link rel="apple-touch-icon" href="icon/icon-192x192.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ==================== متغيرات Ramz‑X الموحَّدة ==================== */
        :root {
            --bg-primary: #000000;
            --bg-card: #111111;
            --bg-input: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
            --text-muted: #777777;
            --accent: #ff0050;
            --accent-blue: #3b82f6;
            --border: #2c2c2c;
            --radius: 1rem;
            --btn-bg: rgba(30,30,35,0.9);
        }
        body.light {
            --bg-primary: #f5f5f5;
            --bg-card: #ffffff;
            --bg-input: #e8e8e8;
            --text-primary: #111111;
            --text-secondary: #444444;
            --text-muted: #666666;
            --border: #e0e0e0;
            --btn-bg: rgba(0,0,0,0.05);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg-primary);
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s;
            position: relative;
        }
        /* زر تبديل الوضع الليلي */
        .theme-toggle {
            position: absolute;
            top: 20px;
            left: 20px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 22px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: color 0.2s;
        }
        .theme-toggle:hover { color: var(--accent); }
        .welcome-container {
            text-align: center;
            padding: 32px;
            max-width: 420px;
        }
        .logo-img {
            width: 150px;
            height: 150px;
            object-fit: contain;
            margin-bottom: 20px;
            animation: fadeIn 0.8s ease;
        }
        .logo-text {
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: none;
            margin-bottom: 20px;
        }
        .tagline {
            color: var(--text-secondary);
            font-size: 18px;
            margin-bottom: 8px;
        }
        .description {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        .start-btn {
            display: inline-block;
            background: var(--accent);
            color: white;
            padding: 16px 48px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s;
            cursor: pointer;
            border: none;
            font-family: 'Cairo', sans-serif;
        }
        .start-btn:hover {
            background: #e00046;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255,0,80,0.3);
        }
        .start-btn i { margin-right: 8px; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <!-- زر تبديل الثيم -->
    <button class="theme-toggle" id="darkModeToggle" title="تغيير المظهر">
        <i class="fas fa-moon"></i>
    </button>

    <div class="welcome-container">
        <!-- شعار المنصة من مجلد icon باسم logo.png -->
        <img src="icon/logo.png" alt="Ramz-X Logo" class="logo-img"
             onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
        <!-- شعار احتياطي في حالة عدم وجود الصورة -->
        <div class="logo-text">Ramz-X</div>
        <div class="tagline">منصة التواصل الاجتماعي العربية</div>
        <div class="description">
            شارك أفكارك، تواصل مع الأصدقاء، واستكشف عالماً جديداً من المحتوى العربي.
        </div>
        <a href="login.html" class="start-btn">
            <i class="fas fa-rocket"></i> ابدأ الآن
        </a>
    </div>

    <script>
        // تطبيق الثيم المحفوظ
        function applyTheme() {
            const saved = localStorage.getItem('darkMode');
            if (saved === 'true') {
                document.body.classList.remove('light');
                document.getElementById('darkModeToggle').innerHTML = '<i class="fas fa-sun"></i>';
            } else {
                document.body.classList.add('light');
                document.getElementById('darkModeToggle').innerHTML = '<i class="fas fa-moon"></i>';
            }
        }
        applyTheme();

        // مستمع زر التبديل
        document.getElementById('darkModeToggle').addEventListener('click', () => {
            const isLight = document.body.classList.contains('light');
            if (isLight) {
                document.body.classList.remove('light');
                localStorage.setItem('darkMode', 'true');
            } else {
                document.body.classList.add('light');
                localStorage.setItem('darkMode', 'false');
            }
            applyTheme();
        });

        // خدمة العامل للتخزين المؤقت (PWA)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('✅ SW مسجل'))
                .catch(err => console.warn('⚠️ SW فشل'));
        }
    </script>
</body>
</html>
